services:
  postgres:
    image: postgres:16-alpine
    container_name: task-manager-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager
      PGPORT: 5433
    ports:
      - '5433:5433'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: